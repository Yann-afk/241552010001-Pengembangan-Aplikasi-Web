<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard App - Abdullah Mubarok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 font-sans overflow-hidden">

    <div class="flex h-screen">
        <aside class="w-64 bg-slate-900 border-r border-white/5 flex flex-col no-scrollbar">
            <div class="p-6">
                <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">My Project</h1>
                <p class="text-[10px] text-slate-500 tracking-[0.3em] font-bold">DASHBOARD v1.0</p>
            </div>

            <nav class="flex-1 px-4 space-y-2 mt-4">
                <p class="px-2 text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-4">Main Menu</p>
                
                <button onclick="changePage('/latihan1')" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl bg-amber-500/10 text-amber-500 border border-amber-500/20 transition-all hover:bg-amber-500/20">
                    <span class="text-lg">👤</span> Profil Premium
                </button>

                <button onclick="changePage('/latihan2')" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-white/5 transition-all">
                    <span class="text-lg">📄</span> Personal Page
                </button>

                <button onclick="changePage('/latihan3')" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-white/5 transition-all">
                    <span class="text-lg">🍗</span> Resep Sate
                </button>

                <button onclick="changePage('/latihan4')" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl hover:bg-white/5 transition-all">
                    <span class="text-lg">🖼️</span> Galeri & Video
                </button>
            </nav>

            <div class="p-4 border-t border-white/5">
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">User Profile</p>
                    <p class="text-xs text-white mt-1">Abdullah Mubarok</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#0f172a]">
            <header class="h-16 border-b border-white/5 bg-slate-900/50 backdrop-blur-md flex items-center justify-between px-8">
                <div id="page-title" class="text-xs font-bold uppercase tracking-widest text-slate-400">Profil Premium</div>
                <div class="flex items-center gap-4">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[10px] font-bold uppercase tracking-tighter">System Online</span>
                </div>
            </header>

            <div class="flex-1 relative">
                <iframe id="mainFrame" src="/latihan1" class="w-full h-full border-none transition-opacity duration-300"></iframe>
            </div>
        </main>
    </div>

    <script>
        function changePage(url) {
            const frame = document.getElementById('mainFrame');
            const title = document.getElementById('page-title');
            
            frame.style.opacity = '0';
            
            setTimeout(() => {
                frame.src = url;
                
                if(url === '/latihan1') title.innerText = 'Profil Premium';
                if(url === '/latihan2') title.innerText = 'Personal Page';
                if(url === '/latihan3') title.innerText = 'Resep Sate';
                if(url === '/latihan4') title.innerText = 'Galeri & Video';
                
                frame.onload = () => {
                    frame.style.opacity = '1';
                };
            }, 200);

            const buttons = document.querySelectorAll('nav button');
            buttons.forEach(btn => {
                btn.classList.remove('bg-amber-500/10', 'text-amber-500', 'border', 'border-amber-500/20');
                btn.classList.add('hover:bg-white/5');
            });
            event.currentTarget.classList.add('bg-amber-500/10', 'text-amber-500', 'border', 'border-amber-500/20');
            event.currentTarget.classList.remove('hover:bg-white/5');
        }
    </script>
</body>
</html>
