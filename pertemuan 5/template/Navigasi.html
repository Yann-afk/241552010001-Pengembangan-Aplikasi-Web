<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My Brand</title>
    <link rel="stylesheet" href="../css style/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"> MY BRAND </div>
        <ul class="nav-links">
            <li><a href="profile.html">Beranda</a></li>
            <li><a href="#">Kurikulum</a></li>
        </ul>
        <a href="profile.html" class="cta">Kembali</a>
    </nav>

    <div class="hero"> <div class="card"> <div class="avatar">
                <i class="login-icon">U</i>
            </div>
            
            <h1 style="font-size: 2rem; margin: 10px 0;">Login User</h1>
            <span class="badge">Akses Kursus</span>

            <form action="#" style="width: 100%; margin-top: 20px;">
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="display: block; color: var(--primary); font-size: 0.8rem; margin-bottom: 5px;">EMAIL</label>
                    <input type="email" placeholder="name@neon.com" required 
                           style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                </div>
                
                <div style="text-align: left; margin-bottom: 25px;">
                    <label style="display: block; color: var(--primary); font-size: 0.8rem; margin-bottom: 5px;">PASSWORD</label>
                    <input type="password" placeholder="••••••••" required 
                           style="width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">
                    MASUK SEKARANG
                </button>
            </form>

            <div class="stats" style="border-top: 1px solid var(--glass-border); width: 100%; padding-top: 20px; margin-top: 10px;">
                <p style="font-size: 0.8rem; color: #999;">Belum punya akun? <a href="#" style="color: var(--accent); text-decoration: none;">Daftar</a></p>
            </div>
        </div>
    </div>
</body>
</html>
