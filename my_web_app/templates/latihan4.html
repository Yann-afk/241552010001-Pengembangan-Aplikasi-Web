<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 4 - Premium Gallery Abdullah</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="top" class="bg-[#0f172a] text-slate-200 min-h-screen antialiased font-sans">

    <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10 p-4">
        <div class="max-w-5xl mx-auto flex justify-center gap-8 text-xs font-bold uppercase tracking-[0.2em]">
            <a href="#galeri" class="hover:text-amber-400 transition-colors">Galeri</a>
            <span class="text-slate-700">|</span>
            <a href="#video" class="hover:text-amber-400 transition-colors">Video</a>
            <span class="text-slate-700">|</span>
            <a href="/latihan1" class="text-amber-500 hover:text-amber-400 transition-colors">Profil Abdullah</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-8 space-y-24">
        
        <section id="galeri" class="pt-10">
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-5xl font-black mb-4 bg-gradient-to-r from-amber-200 via-yellow-500 to-amber-600 bg-clip-text text-transparent uppercase tracking-tighter">
                    Galeri Foto Berlink
                </h1>
                <div class="h-1 w-20 bg-amber-500 mx-auto rounded-full shadow-[0_0_15px_rgba(245,158,11,0.4)]"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <figure class="group bg-slate-900 border border-white/10 rounded-[2rem] p-4 shadow-2xl transition-all hover:border-amber-500/50">
                    <a href="https://www.google.com/imgres?q=spongebob" target="_blank" class="block overflow-hidden rounded-2xl shadow-lg aspect-video">
                        <img src="{{ url_for('static', filename='spongebob.jpg') }}" 
                             alt="SpongeBob SquarePants" 
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </a>
                    <figcaption class="mt-4 text-center text-slate-400 text-sm italic group-hover:text-amber-200 transition-colors">
                        Klik gambar SpongeBob untuk detail karakter.
                    </figcaption>
                </figure>

                <figure class="group bg-slate-900 border border-white/10 rounded-[2rem] p-4 shadow-2xl transition-all hover:border-amber-500/50">
                    <a href="{{ url_for('static', filename='sate.jpg') }}" target="_blank" class="block overflow-hidden rounded-2xl shadow-lg aspect-video">
                        <img src="{{ url_for('static', filename='sate.jpg') }}" 
                             alt="Sate Ayam Madura" 
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    </a>
                    <figcaption class="mt-4 text-center text-slate-400 text-sm italic group-hover:text-amber-200 transition-colors">
                        Klik gambar Sate untuk melihat ukuran penuh.
                    </figcaption>
                </figure>

            </div>
        </section>

        <section id="video">
            <div class="text-center mb-12">
                <h1 class="text-3xl md:text-5xl font-black mb-4 bg-gradient-to-r from-amber-200 via-yellow-500 to-amber-600 bg-clip-text text-transparent uppercase tracking-tighter">
                    Koleksi Video
                </h1>
                <div class="h-1 w-20 bg-amber-500 mx-auto rounded-full shadow-[0_0_15px_rgba(245,158,11,0.4)]"></div>
            </div>

            <div class="flex justify-center">
                <div class="relative p-1 bg-gradient-to-b from-slate-700 to-slate-900 rounded-[2.5rem] shadow-2xl border border-white/5">
                    <video class="w-full max-w-xl rounded-[2.3rem] shadow-inner" controls>
                        <source src="{{ url_for('static', filename='spongebob.mp4') }}" type="video/mp4">
                        Browser Anda tidak mendukung tag video.
                    </video>
                </div>
            </div>
        </section>

        <div class="text-center pt-10">
            <a href="#top" class="inline-flex items-center gap-2 text-slate-500 hover:text-white transition-all group">
                <span class="text-xl group-hover:-translate-y-1 transition-transform">↑</span>
                <span class="text-[10px] font-bold uppercase tracking-[0.3em]">Kembali ke atas</span>
            </a>
        </div>
    </main>

    <footer class="p-10 text-center border-t border-white/5 opacity-40 text-[10px] tracking-[0.5em] uppercase font-medium">
        &copy; 2026 Abdullah Mubarok Maspeke
    </footer>

</body>
</html>
