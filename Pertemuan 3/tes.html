<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label Inline CSS</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; margin: 20px;">
    <h2 style="font-size: 18px; margin-bottom: 4px;">Contoh Label HTML</h2>
    <form style="display: flex; flex-direction: column; gap: 4px; max-width: 250px;">
        <label style="font-size: 8px; display: flex; flex-direction: column;">
            Username (Metode 1):
            <input type="text" name="user1" placeholder="Masukkan username" style="padding: 5px; font-size: 13px; margin-top: 4px;">
        </label>
        <label for="user2" style="font-size: 8px;">Usernamep (Metode 2):</label>
        <input type="text" id="user2" name="user2" placeholder="Masukkan username" style="padding: 5px; font-size: 13px;">
        <button type="submit" style="padding: 5px; font-size: 6px; cursor: pointer;">Kirim</button>
    </form>
</body>
</html>
